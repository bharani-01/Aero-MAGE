# ==============================================================================
# Aero MAGE - Production Nginx Reverse Proxy & Static Web Server Configuration
# Optimized for AWS EC2 / Lightsail Deployment with SSL & WebSockets
# ==============================================================================

# 1. Rate Limiting Zones (Defense against brute force & DDoS)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

# 2. HTTP Server - Redirect all HTTP traffic to HTTPS (SSL)
server {
    listen 80;
    listen [::]:80;
    server_name aeromage.com www.aeromage.com your-ec2-ip.amazonaws.com; # Replace with your domain/IP

    # Let's Encrypt ACME Challenge Directory for SSL
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. HTTPS Server - Primary Production Gateway
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aeromage.com www.aeromage.com your-ec2-ip.amazonaws.com; # Replace with your domain/IP

    # --------------------------------------------------------------------------
    # SSL/TLS Certificate Configuration (Managed via Certbot Let's Encrypt)
    # --------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/aeromage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aeromage.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --------------------------------------------------------------------------
    # Security Headers (OWASP Recommended)
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression for Fast Assets Loading
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --------------------------------------------------------------------------
    # Frontend Static File Serving (Vite Production Build - /dist)
    # --------------------------------------------------------------------------
    root /var/www/aeromage/frontend/dist;
    index index.html;

    # Single Page Application (SPA) Routing Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, Images, Videos, Fonts)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webm|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # --------------------------------------------------------------------------
    # Backend Express API Reverse Proxy (/api)
    # Forward real client IP for MNC-Grade Geolocation Audit Logging
    # --------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:5000; # Node.js backend port
        proxy_http_version 1.1;

        # Forward REAL Client IP & Geolocation Headers to Node.js Backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout configurations for long API requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Rate-limited endpoint for authentication
    location /api/auth/ {
        limit_req zone=login_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------------
    # Socket.IO Real-Time Live Quiz WebSocket Reverse Proxy (/socket.io)
    # --------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket Upgrade Headers Required by Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts for continuous live sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
